# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_commit\
$git_status

$character\
"""

right_format = """
$cmd_duration\
$time
"""

palette = 'dracula'

# Inserts a blank line between shell prompts
add_newline = true
continuation_prompt = "[‚Ėł‚ĖĻ ](dimmed white)"

[palettes.dracula]
pink = "#ff79c6"
red = "#ff5555"
yellow = "#f1fa8c"
green = "#50fa7b"
blue = "#644ac9"
purple = "#bd93f9"
cyan = "#8be9fd"
comment = "#6272a4"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
background = "#282a36"
foreground = "#f8f8f2"

[character]
success_symbol = "[‚ĚĮ](comment)"
error_symbol = "[‚ĚĮ](comment)"
vimcmd_symbol = "[‚ĚĮ](yellow)"

[directory]
style = "bg:cyan fg:background"
truncation_symbol = "‚Ä¶/"
format = "[Óā∂](cyan)[ $path ]($style)[Óāį](fg:cyan bg:background)"

[git_branch]
symbol = "Ôźė "
style = "fg:background bg:pink"
format = "([Óāį](fg:background bg:pink)[ $symbol$branch ]($style)[Óāį](fg:pink bg:background) )"

[git_commit]
tag_symbol = ' Ôźí '
style = "fg:background bg:pink"
format = "(\b\b[\\($hash\\)( $tag) ]($style)[Óāį](fg:pink bg:background) )"
tag_disabled = false

[git_status]
style = "fg:comment bg:background"
format = "([$stashed$ahead_behind]($style))([$conflicted$renamed$modified$untracked$deleted$staged](fg:comment) )"
stashed = "Ôíá ${count} "
ahead = "‚á°${count} "
behind = "‚á£${count} "
conflicted = "[ůįěá ](fg:red)"
renamed = "[ÔĎö ](fg:yellow)"
modified = "[ÔĎô ](fg:yellow)"
untracked = "[ÔĎī ](fg:yellow)"
deleted = "[ÔĎė ](fg:red)"
staged = "[ÔĎó ](fg:green)"

[nodejs]
disabled = true

[package]
disabled = true

[php]
disabled = true

[terraform]
disabled = true

[time]
disabled = false
time_format = "%_I:%M %p"
style = "comment"
format = '[$time]($style)'

[vagrant]
disabled = true
